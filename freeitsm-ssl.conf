#freeitsm-ssl.conf

<VirtualHost *:443>
        ServerAdmin chris@belfasttechservices.co.uk
        DocumentRoot /var/www/freeitsm
        ServerName servicedesk.belfasttechservices.co.uk
        ServerAlias www.servicedesk.belfasttechservices.co.uk
        
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
        SSLEngine on
        
        SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
        SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
        #SSLCertificateChainFile /etc/apache2/ssl.crt/server-ca.crt
        
        Protocols h2 http/1.1
        
        # modern configuration, tweak to your needs
        SSLProtocol             all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1 -TLSv1.2
        SSLHonorCipherOrder     off
        SSLSessionTickets       off
        
        # server default doesn't work, use same CSP as PHPMyAdmin
        Header set Content-Security-Policy "default-src 'self'; script-src 'report-sample' 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'report-sample' 'self' 'unsafe-inline'; form-action 'self'; upgrade-insecure-requests; object-src 'none'; base-uri 'self'; connect-src 'self'; font-src 'self'; frame-ancestors 'self'; frame-src 'self'; img-src 'self' data:; manifest-src 'self'; media-src 'self'; worker-src 'none'; report-uri https://chris18890.report-uri.com/r/d/csp/enforce;"
        
        <FilesMatch "\.(?:cgi|shtml|phtml|php)$">
                SSLOptions +StdEnvVars
        </FilesMatch>
        <Directory /usr/lib/cgi-bin>
                SSLOptions +StdEnvVars
        </Directory>
        <Directory /var/www/freeitsm>
            Options -Indexes +FollowSymLinks +MultiViews
            AllowOverride All
            Order allow,deny
            allow from all
            RewriteEngine On
            RewriteBase /
            RewriteCond %{HTTP_HOST} ^www\.(.*)$ [NC]
            RewriteRule ^(.*)$ https://%1/$1 [R=301,L]
        </Directory>
</VirtualHost>
